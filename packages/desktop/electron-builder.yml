appId: com.siberflow.desktop
productName: Siberflow
directories:
  buildResources: build
  output: dist
# asar disabled: the app bundles puppeteer-core (dynamic requires) and native
# addons (sqlite3, ssh2) that don't behave reliably inside an asar archive.
# Disabling avoids asarUnpack glob issues with the workspace symlink layout.
asar: false
files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readbe.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/*.{md,markdown}"
  - "!**/.{idea,git,cache,vscode,DS_Store}"
extraResources:
  - from: resources
    to: resources
# Publish ke GitHub Releases. GH_TOKEN env var wajib di-set.
publish:
  provider: github
  owner: candrapwr
  repo: siberflow
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  icon: resources/icon.icns
win:
  target:
    - nsis
  icon: resources/icon.ico
linux:
  target:
    - AppImage
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
